services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: friday
      POSTGRES_PASSWORD: friday
      POSTGRES_DB: friday
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friday -d friday"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./docker/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - tempo
      - prometheus

  friday-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FridayDb: "Host=postgres;Port=5432;Database=friday;Username=friday;Password=friday"
      ConnectionStrings__AdminDatabase: "Host=postgres;Port=5432;Database=friday;Username=friday;Password=friday"
      ConnectionStrings__Redis: "redis:6379"
      Database__Provider: PostgreSql
      Database__ApplyMigrationsOnStartup: "true"
      Cache__UseRedis: "true"
      Cache__RedisConnectionString: "redis:6379"
      Authentication__Jwt__Secret: "FridayDockerJwtSecret_ChangeMe_Min32Chars!!!!"
      OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Serilog__GrafanaLoki__Enabled: "true"
      Serilog__GrafanaLoki__Uri: "http://loki:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
      loki:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
